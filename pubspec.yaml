name: ramadan_app
description: "Ramadan Times — Accurate prayer times, Sehri & Iftar countdown, Qibla compass."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Prayer time calculation
  adhan: ^2.0.0+1

  # Location
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # Compass
  flutter_compass: ^0.8.0

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.3

  # UI
  percent_indicator: ^4.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.12

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/

